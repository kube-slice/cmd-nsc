---
name: automerge
on:
  workflow_run:
    types:
      - completed
    workflows:
      - "ci"
jobs:
  print-debug-info:
    name: Print debug info
    runs-on: ubuntu-latest
    steps:
      - uses: hmarr/debug-action@a701ed95a46e6f2fb0df25e1a558c16356fae35a # v2

  check-mergeability:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.actor == 'nsmbot' }}
    uses: networkservicemesh/.github/.github/workflows/check-mergeability.yaml@fe8cd964c2e13a408077d9a78b939934e3b4521f # main
    secrets:
      token: ${{ secrets.NSM_BOT_GITHUB_TOKEN }}

  automerge:
    needs: [check-mergeability]
    if: ${{ needs.check-mergeability.result == 'success' }}
    uses: networkservicemesh/.github/.github/workflows/automerge.yaml@fe8cd964c2e13a408077d9a78b939934e3b4521f # main

  resolve_conflicts:
    needs: [check-mergeability]
    if: ${{ always() && needs.check-mergeability.result == 'failure' && needs.check-mergeability.outputs.pr_branch_ref != '' }}
    uses: networkservicemesh/.github/.github/workflows/resolve-conflicts.yaml@fe8cd964c2e13a408077d9a78b939934e3b4521f # main
    with:
      pr_branch_ref: ${{ needs.check-mergeability.outputs.pr_branch_ref }}
    secrets:
      token: ${{ secrets.NSM_BOT_GITHUB_TOKEN }}
